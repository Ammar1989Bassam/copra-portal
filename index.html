<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copra – Wholesale Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --nv:#1B2A4A;--nv2:#243558;--gd:#C9993A;--gd2:#b8882e;
  --bg:#F7F8FA;--bg2:#fff;--bd:#E2E8F0;--mu:#64748B;
  --rd:#DC2626;--gn:#16A34A;--bl:#2563EB;--or:#D97706;
  --tx:#1E293B;--sh:0 1px 3px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}

/* ── Login ── */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--nv)}
.login-box{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.login-logo{text-align:center;margin-bottom:28px}
.login-logo h1{font-size:26px;font-weight:800;color:var(--nv)}
.login-logo p{font-size:13px;color:var(--mu);margin-top:4px}
.login-logo .dot{color:var(--gd)}
.lf label{display:block;font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:5px}
.lf input{width:100%;padding:11px 14px;border:1.5px solid var(--bd);border-radius:8px;font-size:14px;outline:none;transition:border .15s}
.lf input:focus{border-color:var(--gd)}
.lf{margin-bottom:14px}
.btn-login{width:100%;padding:13px;background:var(--gd);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;transition:background .15s}
.btn-login:hover{background:var(--gd2)}
#login-err{color:var(--rd);font-size:12px;margin-top:8px;text-align:center;min-height:18px}

/* ── App Shell ── */
#app-shell{display:none;flex-direction:column;min-height:100vh}
.portal-header{background:var(--nv);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.portal-header h1{font-size:17px;font-weight:700;color:var(--gd)}
.portal-header .hright{display:flex;align-items:center;gap:12px;font-size:13px}
.portal-header .welcome{color:rgba(255,255,255,.7)}
.btn-sm{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:none}
.btn-out{background:rgba(255,255,255,.15);color:#fff}
.btn-out:hover{background:rgba(255,255,255,.25)}

/* ── Tabs ── */
.portal-tabs{background:#fff;border-bottom:2px solid var(--bd);display:flex;gap:0;padding:0 24px}
.tab{padding:14px 18px;font-size:13px;font-weight:600;color:var(--mu);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .15s}
.tab.active{color:var(--nv);border-bottom-color:var(--gd)}
.tab:hover:not(.active){color:var(--tx)}

/* ── Content ── */
.portal-content{padding:24px;max-width:1100px;margin:0 auto;width:100%}
.pg{display:none}.pg.active{display:block}

/* ── Cards & Tables ── */
.card{background:#fff;border-radius:10px;padding:20px;box-shadow:var(--sh);margin-bottom:18px}
.card h2{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--nv)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;color:var(--mu);background:var(--bg);border-bottom:1px solid var(--bd)}
td{padding:10px 12px;border-bottom:1px solid var(--bd);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700}
.badge-gn{background:#dcfce7;color:#166534}
.badge-or{background:#fef3c7;color:#92400e}
.badge-rd{background:#fee2e2;color:#991b1b}
.badge-bl{background:#dbeafe;color:#1e40af}
.empty{text-align:center;padding:40px;color:var(--mu);font-size:13px}

/* ── Stats ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:20px}
.stat{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:var(--sh)}
.stat .val{font-size:22px;font-weight:800;color:var(--nv)}
.stat .lbl{font-size:11px;color:var(--mu);margin-top:3px}

/* ── Catalog ── */
.cat-filters{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.cat-filters input,.cat-filters select{padding:8px 12px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;outline:none}
.cat-filters input:focus,.cat-filters select:focus{border-color:var(--gd)}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
.prod-card{background:#fff;border-radius:10px;padding:16px;box-shadow:var(--sh);border:1.5px solid var(--bd);transition:border .15s}
.prod-card:hover{border-color:var(--gd)}
.prod-card h3{font-size:13px;font-weight:700;color:var(--nv);margin-bottom:6px}
.prod-card .meta{font-size:11px;color:var(--mu);margin-bottom:10px}
.prod-card .price{font-size:18px;font-weight:800;color:var(--gd)}
.prod-card .stock{font-size:11px;color:var(--mu);margin-top:2px}
.btn-order{width:100%;margin-top:10px;padding:8px;background:var(--nv);color:#fff;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s}
.btn-order:hover{background:var(--nv2)}
.btn-order:disabled{background:var(--bd);color:var(--mu);cursor:not-allowed}

/* ── Modal ── */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.mo.open{display:flex}
.md{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.mt{font-size:16px;font-weight:700;margin-bottom:18px;color:var(--nv)}
.fg{display:grid;gap:12px}
.fgp label{display:block;font-size:11px;font-weight:700;color:var(--mu);margin-bottom:4px}
.fgp input,.fgp select,.fgp textarea{width:100%;padding:9px 12px;border:1.5px solid var(--bd);border-radius:7px;font-size:13px;outline:none}
.fgp input:focus,.fgp select:focus{border-color:var(--gd)}
.fa{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
.btn{padding:9px 18px;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-p{background:var(--gd);color:#fff}.btn-p:hover{background:var(--gd2)}
.btn-s{background:var(--bg);color:var(--tx);border:1px solid var(--bd)}

/* ── Loader ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spin{width:36px;height:36px;border:3px solid rgba(201,153,58,.2);border-top-color:var(--gd);border-radius:50%;animation:spin .8s linear infinite;margin:40px auto;display:block}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <h1>Copra<span class="dot">.</span></h1>
      <p>Wholesale Customer Portal</p>
    </div>
    <div class="lf">
      <label>Username</label>
      <input type="text" id="login-username" placeholder="Your username" autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('login-pin').focus()">
    </div>
    <div class="lf">
      <label>Password</label>
      <input type="password" id="login-pin" placeholder="Your password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doPortalLogin()">
    </div>
    <button class="btn-login" onclick="doPortalLogin()">Sign In</button>
    <div id="login-err"></div>
  </div>
</div>

<!-- APP SHELL -->
<div id="app-shell">
  <div class="portal-header">
    <h1>Copra Wholesale</h1>
    <div class="hright">
      <span class="welcome" id="welcome-name"></span>
      <button class="btn-sm btn-out" onclick="doLogout()">Sign Out</button>
    </div>
  </div>
  <div class="portal-tabs">
    <div class="tab active" onclick="switchTab('overview')">📊 Overview</div>
    <div class="tab" onclick="switchTab('catalog')">🛍️ Catalog</div>
    <div class="tab" onclick="switchTab('orders')">📋 My Orders</div>
    <div class="tab" onclick="switchTab('account')">👤 Account</div>
  </div>
  <div class="portal-content">

    <!-- OVERVIEW -->
    <div class="pg active" id="pg-overview">
      <div class="stats-grid">
        <div class="stat"><div class="val" id="stat-orders">—</div><div class="lbl">Total Orders</div></div>
        <div class="stat"><div class="val" id="stat-spend">—</div><div class="lbl">Total Spent</div></div>
        <div class="stat"><div class="val" id="stat-balance">—</div><div class="lbl">Outstanding Balance</div></div>
        <div class="stat"><div class="val" id="stat-credit">—</div><div class="lbl">Credit Limit</div></div>
      </div>
      <div class="card">
        <h2>Recent Orders</h2>
        <div id="recent-orders-list"></div>
      </div>
    </div>

    <!-- CATALOG -->
    <div class="pg" id="pg-catalog">
      <div class="card">
        <h2>Product Catalog</h2>
        <div class="cat-filters">
          <input type="text" id="cat-search" placeholder="🔍 Search products…" oninput="renderCatalog()">
          <select id="cat-make" onchange="filterModels()"><option value="">All Makes</option></select>
          <select id="cat-model" onchange="renderCatalog()"><option value="">All Models</option></select>
        </div>
        <div class="prod-grid" id="prod-grid"></div>
      </div>
    </div>

    <!-- ORDERS -->
    <div class="pg" id="pg-orders">
      <div class="card">
        <h2>My Order History</h2>
        <div id="orders-list"></div>
      </div>
    </div>

    <!-- ACCOUNT -->
    <div class="pg" id="pg-account">
      <div class="card">
        <h2>Account Details</h2>
        <div id="account-details"></div>
      </div>
      <div class="card">
        <h2>Change Password</h2>
        <div class="fg">
          <div class="fgp"><label>New Password</label><input type="password" id="new-pw" placeholder="Min 4 characters"></div>
          <div class="fgp"><label>Confirm Password</label><input type="password" id="conf-pw" placeholder="Repeat password"></div>
        </div>
        <div style="margin-top:14px;display:flex;align-items:center;gap:12px">
          <button class="btn btn-p" onclick="changePortalPassword()">Update Password</button>
          <span id="pw-msg" style="font-size:12px"></span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ORDER MODAL -->
<div class="mo" id="m-order">
  <div class="md">
    <div class="mt" id="order-modal-title">Place Order</div>
    <div class="fg">
      <div class="fgp"><label>Product</label><div id="order-product-info" style="font-size:13px;color:var(--mu);padding:8px 0"></div></div>
      <div class="fgp"><label>Unit Price</label><div id="order-price" style="font-size:20px;font-weight:800;color:var(--gd)"></div></div>
      <div class="fgp"><label>Quantity</label><input type="number" id="order-qty" min="1" value="1" oninput="updateOrderTotal()"></div>
      <div class="fgp"><label>Total</label><div id="order-total" style="font-size:16px;font-weight:700;color:var(--nv)"></div></div>
      <div class="fgp"><label>Notes</label><textarea id="order-notes" rows="2" placeholder="Special instructions…"></textarea></div>
    </div>
    <div class="fa">
      <button class="btn btn-s" onclick="closeOrder()">Cancel</button>
      <button class="btn btn-p" onclick="submitOrder()">Submit Order</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────
const SB_URL  = 'https://edopxfjzwxyctqdbzagr.supabase.co';
const SB_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkb3B4Zmp6d3h5Y3RxZGJ6YWdyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5NTMyMTQsImV4cCI6MjA5NzUyOTIxNH0.55wDddJZ6g5_jM-o8UhYb0yvJ2xMKKyZ-FzFFC7F0qI';
const SB_SVC  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVkb3B4Zmp6d3h5Y3RxZGJ6YWdyIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MTk1MzIxNCwiZXhwIjoyMDk3NTI5MjE0fQ.PKhVch7tMclj_hLkUmFAkm80eOrR8XlMTpCWB0eNoGA';
const SK = 'copra_portal_session_v1';

// ── State ─────────────────────────────────────────────────────────
let CUSTOMER = null; // {customer_id, name, discount_pct, credit_limit}
let DB = { products:[], variants:[], sales:[], reservations:[] };
let ORDER_VARIANT = null;

// ── Supabase helpers ─────────────────────────────────────────────
async function sbFetch(path, opts={}, svc=false) {
  const key = svc ? SB_SVC : SB_ANON;
  const res = await fetch(SB_URL + path, {
    headers: {
      'apikey': key,
      'Authorization': 'Bearer ' + key,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=minimal'
    },
    ...opts
  });
  if (!res.ok) { const e = await res.text(); throw new Error(e); }
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('json') && res.status !== 204) return res.json();
  return null;
}
async function sbSelect(table, query='', svc=false) {
  return sbFetch(`/rest/v1/${table}?${query}&limit=5000`, {}, svc);
}
async function sbInsert(table, row) {
  return sbFetch(`/rest/v1/${table}`, { method:'POST', body:JSON.stringify(row), prefer:'return=representation' }, true);
}

// ── Format helpers ───────────────────────────────────────────────
const nisF = n => '₪' + (+n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const dF   = d => { if(!d) return '—'; try { return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}); } catch(e) { return d; }};
const uid  = () => 'r' + Date.now().toString(36) + Math.random().toString(36).slice(2,6);

// ── Login ────────────────────────────────────────────────────────
async function doPortalLogin() {
  const username = (document.getElementById('login-username').value||'').trim().toLowerCase();
  const password = document.getElementById('login-pin').value;
  const errEl = document.getElementById('login-err');
  if (!username || !password) { errEl.textContent = 'Enter username and password.'; return; }
  errEl.textContent = '⏳ Signing in…';
  try {
    const res = await sbFetch('/rest/v1/rpc/verify_portal_login', {
      method: 'POST',
      body: JSON.stringify({ p_username: username, p_password: password }),
      prefer: 'return=representation'
    }, false);
    if (!res || !res.customer_id) {
      errEl.textContent = '❌ Incorrect username or password.';
      document.getElementById('login-pin').value = '';
      return;
    }
    CUSTOMER = res;
    sessionStorage.setItem(SK, JSON.stringify(res));
    await loadPortalData();
    showApp();
  } catch(e) {
    errEl.textContent = '❌ Login failed. Please try again.';
    console.error(e);
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';
  document.getElementById('app-shell').style.flexDirection = 'column';
  document.getElementById('welcome-name').textContent = CUSTOMER.name;
  renderOverview();
  renderCatalog();
  renderOrders();
  renderAccount();
}

function doLogout() {
  sessionStorage.removeItem(SK);
  CUSTOMER = null;
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-pin').value = '';
  document.getElementById('login-username').value = '';
  document.getElementById('login-err').textContent = '';
}

// ── Load data ────────────────────────────────────────────────────
async function loadPortalData() {
  const [products, variants, sales, reservations] = await Promise.all([
    sbSelect('products', 'select=*', false),
    sbSelect('variants', 'select=*&stock_qty=gt.0', false),
    sbSelect('sales', `customer_id=eq.${CUSTOMER.customer_id}&select=*&order=date.desc`, true),
    sbSelect('reservations', `customer_id=eq.${CUSTOMER.customer_id}&select=*&order=created_at.desc`, true),
  ]);
  DB.products     = products     || [];
  DB.variants     = variants     || [];
  DB.sales        = sales        || [];
  DB.reservations = reservations || [];
}

// ── Tab switching ────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.pg').forEach(p => p.classList.remove('active'));
  event.currentTarget.classList.add('active');
  document.getElementById('pg-' + tab).classList.add('active');
}

// ── Overview ─────────────────────────────────────────────────────
function renderOverview() {
  const sales = DB.sales.filter(s => !s.is_return);
  const totalSpend = sales.reduce((a,s) => a + (+s.unit_price||0) * (+s.qty||1), 0);
  const outstanding = sales.filter(s => s.payment_status !== 'Collected' && s.payment_status !== 'Paid')
    .reduce((a,s) => a + (+s.unit_price||0) * (+s.qty||1), 0);

  document.getElementById('stat-orders').textContent   = sales.length;
  document.getElementById('stat-spend').textContent    = nisF(totalSpend);
  document.getElementById('stat-balance').textContent  = nisF(outstanding);
  document.getElementById('stat-credit').textContent   = nisF(CUSTOMER.credit_limit||0);

  const recent = DB.sales.slice(0, 8);
  const el = document.getElementById('recent-orders-list');
  if (!recent.length) { el.innerHTML = '<div class="empty">No orders yet.</div>'; return; }
  el.innerHTML = `<div style="overflow-x:auto"><table>
    <thead><tr><th>Date</th><th>Product</th><th>Qty</th><th>Total</th><th>Status</th></tr></thead>
    <tbody>${recent.map(s => `<tr>
      <td>${dF(s.date)}</td>
      <td>${s.product_name || '—'} <span style="font-size:11px;color:var(--mu)">${s.variant_label||''}</span></td>
      <td>${s.qty}</td>
      <td>${nisF((+s.unit_price||0)*(+s.qty||1))}</td>
      <td><span class="badge ${s.payment_status==='Collected'||s.payment_status==='Paid'?'badge-gn':s.payment_status==='Credit'?'badge-or':'badge-bl'}">${s.payment_status||'—'}</span></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ── Catalog ──────────────────────────────────────────────────────
function filterModels() {
  const make = document.getElementById('cat-make').value;
  const modelSel = document.getElementById('cat-model');
  const models = [...new Set(
    DB.variants.filter(v => !make || v.car_make === make).map(v => v.car_model).filter(Boolean)
  )].sort();
  modelSel.innerHTML = '<option value="">All Models</option>' + models.map(m => `<option>${m}</option>`).join('');
  renderCatalog();
}

function renderCatalog() {
  const search = (document.getElementById('cat-search').value||'').toLowerCase();
  const make   = document.getElementById('cat-make').value;
  const model  = document.getElementById('cat-model').value;
  const disc   = +CUSTOMER.discount_pct || 0;

  // Populate makes dropdown once
  const makesSel = document.getElementById('cat-make');
  if (makesSel.options.length <= 1) {
    const makes = [...new Set(DB.variants.map(v => v.car_make).filter(Boolean))].sort();
    makes.forEach(m => { const o = document.createElement('option'); o.value = m; o.textContent = m; makesSel.appendChild(o); });
  }

  let variants = DB.variants.filter(v => v.stock_qty > 0);
  if (make)   variants = variants.filter(v => v.car_make === make);
  if (model)  variants = variants.filter(v => v.car_model === model);
  if (search) variants = variants.filter(v => {
    const p = DB.products.find(p => p.id === v.product_id);
    const label = `${p?.name||''} ${v.car_make||''} ${v.car_model||''} ${v.set_type||''}`.toLowerCase();
    return label.includes(search);
  });

  const grid = document.getElementById('prod-grid');
  if (!variants.length) { grid.innerHTML = '<div class="empty" style="grid-column:1/-1">No products found.</div>'; return; }

  grid.innerHTML = variants.map(v => {
    const p = DB.products.find(p => p.id === v.product_id);
    const basePrice = +v.wholesale || +v.retail || 0;
    const price = disc > 0 ? basePrice * (1 - disc/100) : basePrice;
    return `<div class="prod-card">
      <h3>${p?.name || 'Product'}</h3>
      <div class="meta">${[v.car_make, v.car_model, v.year_from&&v.year_to?v.year_from+'-'+v.year_to:'', v.set_type].filter(Boolean).join(' · ')}</div>
      <div class="price">${nisF(price)}${disc>0?` <span style="font-size:11px;color:var(--gn)">(-${disc}%)</span>`:''}</div>
      <div class="stock">📦 ${v.stock_qty} in stock</div>
      <button class="btn-order" onclick="openOrder('${v.id}')">Order Now</button>
    </div>`;
  }).join('');
}

// ── Orders ───────────────────────────────────────────────────────
function renderOrders() {
  const el = document.getElementById('orders-list');
  const all = [...DB.sales, ...DB.reservations.map(r => ({...r, _is_reservation:true}))];
  if (!all.length) { el.innerHTML = '<div class="empty">No orders yet.</div>'; return; }

  const sales = DB.sales;
  el.innerHTML = !sales.length ? '<div class="empty">No orders yet.</div>' : 
    `<div style="overflow-x:auto"><table>
    <thead><tr><th>Date</th><th>Product</th><th>Variant</th><th>Qty</th><th>Unit Price</th><th>Total</th><th>Payment</th><th>Status</th></tr></thead>
    <tbody>${sales.map(s => `<tr>
      <td>${dF(s.date)}</td>
      <td>${s.product_name||'—'}</td>
      <td style="font-size:11px;color:var(--mu)">${s.variant_label||'—'}</td>
      <td>${s.qty}</td>
      <td>${nisF(s.unit_price)}</td>
      <td>${nisF((+s.unit_price||0)*(+s.qty||1))}</td>
      <td>${s.payment_type||'—'}</td>
      <td><span class="badge ${s.payment_status==='Collected'||s.payment_status==='Paid'?'badge-gn':s.payment_status==='Credit'?'badge-or':'badge-bl'}">${s.payment_status||'—'}</span></td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

// ── Account ──────────────────────────────────────────────────────
function renderAccount() {
  const el = document.getElementById('account-details');
  const sales = DB.sales.filter(s => !s.is_return);
  const outstanding = sales.filter(s => s.payment_status !== 'Collected' && s.payment_status !== 'Paid')
    .reduce((a,s) => a + (+s.unit_price||0) * (+s.qty||1), 0);
  el.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;font-size:13px">
    <div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:4px">Company Name</div><div style="font-weight:600">${CUSTOMER.name}</div></div>
    <div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:4px">Discount Rate</div><div style="font-weight:600;color:var(--gn)">${CUSTOMER.discount_pct||0}%</div></div>
    <div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:4px">Credit Limit</div><div style="font-weight:600">${nisF(CUSTOMER.credit_limit||0)}</div></div>
    <div><div style="font-size:10px;font-weight:700;color:var(--mu);text-transform:uppercase;margin-bottom:4px">Outstanding Balance</div><div style="font-weight:600;color:${outstanding>0?'var(--rd)':'var(--gn)'}">${nisF(outstanding)}</div></div>
  </div>`;
}

// ── Order Modal ──────────────────────────────────────────────────
function openOrder(variantId) {
  const v = DB.variants.find(x => x.id === variantId);
  if (!v) return;
  const p = DB.products.find(x => x.id === v.product_id);
  const disc = +CUSTOMER.discount_pct || 0;
  const basePrice = +v.wholesale || +v.retail || 0;
  const price = disc > 0 ? basePrice * (1 - disc/100) : basePrice;

  ORDER_VARIANT = { variant: v, product: p, price };
  document.getElementById('order-modal-title').textContent = p?.name || 'Place Order';
  document.getElementById('order-product-info').textContent =
    [v.car_make, v.car_model, v.year_from&&v.year_to?v.year_from+'-'+v.year_to:'', v.set_type].filter(Boolean).join(' · ');
  document.getElementById('order-price').textContent = nisF(price) + (disc>0 ? ` (${disc}% discount applied)` : '');
  document.getElementById('order-qty').value = 1;
  document.getElementById('order-notes').value = '';
  updateOrderTotal();
  document.getElementById('m-order').classList.add('open');
}

function updateOrderTotal() {
  if (!ORDER_VARIANT) return;
  const qty = +document.getElementById('order-qty').value || 1;
  document.getElementById('order-total').textContent = nisF(ORDER_VARIANT.price * qty);
}

function closeOrder() {
  document.getElementById('m-order').classList.remove('open');
  ORDER_VARIANT = null;
}

async function submitOrder() {
  if (!ORDER_VARIANT) return;
  const qty = +document.getElementById('order-qty').value || 1;
  const notes = document.getElementById('order-notes').value;
  const v = ORDER_VARIANT.variant;

  if (qty > v.stock_qty) {
    alert(`Only ${v.stock_qty} units available.`);
    return;
  }

  const reservation = {
    id: uid(),
    customer_id: CUSTOMER.customer_id,
    customer_name: CUSTOMER.name,
    product_id: v.product_id,
    variant_id: v.id,
    qty,
    date: new Date().toISOString().split('T')[0],
    status: 'Pending',
    notes
  };

  try {
    await sbInsert('reservations', reservation);
    DB.reservations.unshift(reservation);
    closeOrder();
    alert('✅ Order submitted successfully! Our team will contact you to confirm.');
    renderOverview();
    renderOrders();
  } catch(e) {
    alert('❌ Failed to submit order: ' + e.message);
  }
}

// ── Change Password ──────────────────────────────────────────────
async function changePortalPassword() {
  const np = document.getElementById('new-pw').value;
  const cp = document.getElementById('conf-pw').value;
  const msg = document.getElementById('pw-msg');
  if (np.length < 4) { msg.style.color='var(--rd)'; msg.textContent='Min 4 characters.'; return; }
  if (np !== cp)     { msg.style.color='var(--rd)'; msg.textContent='Passwords do not match.'; return; }
  try {
    // Get portal username from session to update password
    const sess = JSON.parse(sessionStorage.getItem(SK)||'{}');
    // We need to know the username — store it on login
    const uname = sess.portal_username;
    if (!uname) { msg.style.color='var(--rd)'; msg.textContent='Session error. Please log out and back in.'; return; }
    await sbFetch('/rest/v1/rpc/update_portal_password', {
      method:'POST',
      body: JSON.stringify({ p_customer_id: CUSTOMER.customer_id, p_password: np })
    }, true);
    msg.style.color='var(--gn)'; msg.textContent='✅ Password updated!';
    document.getElementById('new-pw').value='';
    document.getElementById('conf-pw').value='';
    setTimeout(() => msg.textContent='', 3000);
  } catch(e) {
    msg.style.color='var(--rd)'; msg.textContent='❌ ' + e.message;
  }
}

// ── Session restore ──────────────────────────────────────────────
async function init() {
  const s = sessionStorage.getItem(SK);
  if (s) {
    try {
      CUSTOMER = JSON.parse(s);
      await loadPortalData();
      showApp();
      return;
    } catch(e) { sessionStorage.removeItem(SK); }
  }
  document.getElementById('login-screen').style.display = 'flex';
  setTimeout(() => document.getElementById('login-username').focus(), 100);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
